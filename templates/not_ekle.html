{% extends 'base.html' %}

{% block icerik %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-warning">
                <h5 class="mb-0"><i class="bi bi-clipboard-plus"></i> Yeni Not Ekle</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Öğrenci</label>
                        <select name="ogrenci_id" class="form-select" required>
                            <option value="">-- Öğrenci Seç --</option>
                            {% for o in ogrenciler %}
                            <option value="{{ o.id }}">{{ o.ad }} {{ o.soyad }} ({{ o.ogrenci_no }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Ders</label>
                        <select name="ders_id" class="form-select" required>
                            <option value="">-- Ders Seç --</option>
                            {% for d in dersler %}
                            <option value="{{ d.id }}">{{ d.ders_adi }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Not Türü</label>
                        <select name="not_turu" class="form-select" required>
                            <option value="">-- Not Türü Seç --</option>
                            <option value="Vize">Vize</option>
                            <option value="Final">Final</option>
                            <option value="Ödev">Ödev</option>
                            <option value="Quiz">Quiz</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Not Değeri</label>
                        <input type="number" name="not_degeri" class="form-control"
                               min="0" max="100" step="0.5" placeholder="Örn: 85" required>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-warning w-100">
                            <i class="bi bi-check-circle"></i> Kaydet
                        </button>
                        <a href="/notlar" class="btn btn-secondary w-100">
                            <i class="bi bi-x-circle"></i> İptal
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
