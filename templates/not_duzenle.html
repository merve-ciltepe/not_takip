{% extends 'base.html' %}

{% block icerik %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-warning">
                <h5 class="mb-0"><i class="bi bi-pencil-square"></i> Not Düzenle</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Not Türü</label>
                        <select name="not_turu" class="form-select" required>
                            <option value="Vize" {% if not_kaydi.not_turu == 'Vize' %}selected{% endif %}>Vize</option>
                            <option value="Final" {% if not_kaydi.not_turu == 'Final' %}selected{% endif %}>Final</option>
                            <option value="Ödev" {% if not_kaydi.not_turu == 'Ödev' %}selected{% endif %}>Ödev</option>
                            <option value="Quiz" {% if not_kaydi.not_turu == 'Quiz' %}selected{% endif %}>Quiz</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Not Değeri</label>
                        <input type="number" name="not_degeri" class="form-control"
                               min="0" max="100" step="0.5"
                               value="{{ not_kaydi.not_degeri }}" required>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-warning w-100">
                            <i class="bi bi-check-circle"></i> Güncelle
                        </button>
                        <a href="/notlar" class="btn btn-secondary w-100">
                            <i class="bi bi-x-circle"></i> İptal
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
