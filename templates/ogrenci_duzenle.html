{% extends 'base.html' %}

{% block icerik %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-warning">
                <h5 class="mb-0"><i class="bi bi-pencil-square"></i> Öğrenci Düzenle</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Ad</label>
                        <input type="text" name="ad" class="form-control" value="{{ ogrenci.ad }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Soyad</label>
                        <input type="text" name="soyad" class="form-control" value="{{ ogrenci.soyad }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Email</label>
                        <input type="email" name="email" class="form-control" value="{{ ogrenci.email }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Öğrenci No</label>
                        <input type="text" class="form-control" value="{{ ogrenci.ogrenci_no }}" disabled>
                        <small class="text-muted">Öğrenci no değiştirilemez.</small>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-warning w-100">
                            <i class="bi bi-check-circle"></i> Güncelle
                        </button>
                        <a href="/ogrenciler" class="btn btn-secondary w-100">
                            <i class="bi bi-x-circle"></i> İptal
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
